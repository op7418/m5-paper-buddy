; M5Paper V1.1 — 960x540 e-ink (portrait use: 540x960), ESP32 + PSRAM,
; 3 side buttons (UP/PUSH/DOWN), GT911 capacitive touch. Build:
;   pio run -e m5paper -t uploadfs   (flashes the CJK font to LittleFS)
;   pio run -e m5paper -t upload     (flashes firmware)
[env:m5paper]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
board_build.filesystem = littlefs
board_build.partitions = partitions-m5paper.csv
board_build.f_cpu = 240000000L
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
board_build.psram = enabled
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
build_src_filter = -<*> +<ble_bridge.cpp> +<paper/>
lib_deps =
    m5stack/M5EPD @ ^0.1.5
    bblanchon/ArduinoJson @ ^7.0.0
